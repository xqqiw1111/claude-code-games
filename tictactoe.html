<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #mode-select {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    #mode-select button {
      padding: 0.5rem 1.2rem;
      border: 2px solid #0f3460;
      background: #16213e;
      color: #aaa;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    #mode-select button.active {
      background: #0f3460;
      color: #fff;
      border-color: #a8dadc;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 16px rgba(233, 69, 96, 0.6);
    }

    #restart {
      margin-top: 2rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #restart:hover { background: #c73652; }

    #score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
      color: #888;
    }

    #score span { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    #score b { font-size: 1.6rem; }
    .score-x b { color: #e94560; }
    .score-o b { color: #a8dadc; }
    .score-d b { color: #888; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="mode-select">
    <button id="btn-2p" class="active">2 Players</button>
    <button id="btn-cpu">vs Computer</button>
  </div>

  <div id="score">
    <span class="score-x" id="label-x">X <b id="sx">0</b></span>
    <span class="score-d">Draws <b id="sd">0</b></span>
    <span class="score-o" id="label-o">O <b id="so">0</b></span>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="restart">New Game</button>

  <script>
    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const scores = { X: 0, O: 0, D: 0 };
    let board, current, over, vsComputer;

    const wins = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    // Mode buttons
    document.getElementById('btn-2p').addEventListener('click', () => setMode(false));
    document.getElementById('btn-cpu').addEventListener('click', () => setMode(true));

    function setMode(cpu) {
      vsComputer = cpu;
      document.getElementById('btn-2p').classList.toggle('active', !cpu);
      document.getElementById('btn-cpu').classList.toggle('active', cpu);
      document.getElementById('label-x').textContent = '';
      document.getElementById('label-o').textContent = '';
      document.getElementById('label-x').innerHTML = (cpu ? 'You (X)' : 'X') + ' <b id="sx">' + scores.X + '</b>';
      document.getElementById('label-o').innerHTML = (cpu ? 'CPU (O)' : 'O') + ' <b id="so">' + scores.O + '</b>';
      init();
    }

    function init() {
      board = Array(9).fill('');
      current = 'X';
      over = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      status.textContent = vsComputer ? "Your turn (X)" : "X's turn";
    }

    function checkWin(b) {
      for (const [a, i, c] of wins) {
        if (b[a] && b[a] === b[i] && b[a] === b[c]) return [a, i, c];
      }
      return null;
    }

    function minimax(b, isMax, depth = 0) {
      const maxDepth = 6;
      const w = checkWin(b);
      if (w) return isMax ? -10 : 10;
      if (b.every(Boolean)) return 0;
      if (depth >= maxDepth) return 0;

      let best = isMax ? -Infinity : Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = isMax ? 'O' : 'X';
          const score = minimax(b, !isMax, depth + 1);
          b[i] = '';
          best = isMax ? Math.max(best, score) : Math.min(best, score);
        }
      }
      return best;
    }

    function cpuMove() {
      let bestScore = -Infinity, bestMove = -1;
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'O';
          const score = minimax(board, false);
          board[i] = '';
          if (score > bestScore) { bestScore = score; bestMove = i; }
        }
      }
      return bestMove;
    }

    function playMove(i) {
      board[i] = current;
      cells[i].textContent = current;
      cells[i].classList.add('taken', current.toLowerCase());

      const winLine = checkWin(board);
      if (winLine) {
        over = true;
        winLine.forEach(idx => cells[idx].classList.add('win'));
        if (vsComputer) {
          status.textContent = current === 'X' ? 'You win!' : 'Computer wins!';
        } else {
          status.textContent = `${current} wins!`;
        }
        scores[current]++;
        updateScores();
      } else if (board.every(Boolean)) {
        over = true;
        status.textContent = "It's a draw!";
        scores.D++;
        updateScores();
      } else {
        current = current === 'X' ? 'O' : 'X';
        if (vsComputer) {
          status.textContent = current === 'X' ? "Your turn (X)" : "Computer thinking...";
        } else {
          status.textContent = `${current}'s turn`;
        }
        if (vsComputer && current === 'O') {
          setTimeout(() => {
            if (!over) playMove(cpuMove());
          }, 300);
        }
      }
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (over || board[i]) return;
        if (vsComputer && current === 'O') return;
        playMove(i);
      });
    });

    function updateScores() {
      document.getElementById('sx').textContent = scores.X;
      document.getElementById('so').textContent = scores.O;
      document.getElementById('sd').textContent = scores.D;
    }

    document.getElementById('restart').addEventListener('click', init);

    setMode(false);
  </script>
</body>
</html>
